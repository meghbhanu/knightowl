# DO NOT commit real values — create this secret with kubectl create secret
# kubectl create secret generic knightowl-secrets --namespace=knightowl \
#   --from-literal=ANTHROPIC_API_KEY=your-key \
#   --from-literal=POSTGRES_PASSWORD=your-password \
#   --from-literal=POSTGRES_USER=knightowl \
#   --from-literal=POSTGRES_DB=knightowl
apiVersion: v1
kind: Secret
metadata:
  name: knightowl-secrets
  namespace: knightowl
type: Opaque
data:
  ANTHROPIC_API_KEY: <base64-encoded-value>
  POSTGRES_PASSWORD: <base64-encoded-value>
  POSTGRES_USER: <base64-encoded-value>
  POSTGRES_DB: <base64-encoded-value>